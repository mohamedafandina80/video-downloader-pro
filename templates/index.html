<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>U2 | DOWNLOADER | PRO SPEED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        :root { --gold: #ffd700; --dark: #020202; }
        body { background: var(--dark); font-family: 'Cairo', sans-serif; color: #fff; overflow-x: hidden; }
        
        #magic-bg { position: fixed; inset: 0; z-index: -4; background: #000; }
        .cyber-grid { position: fixed; inset: 0; z-index: -3; background-image: linear-gradient(rgba(255, 215, 0, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 215, 0, 0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
        #bg-glow { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 50% 30%, rgba(181, 148, 16, 0.15) 0%, transparent 70%); transition: 0.8s ease; }
        #particle-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        /* 👑 لوجو البراند الجديد */
        .brand-logo { font-size: clamp(3rem, 7vw, 5.5rem); font-weight: 900; background: linear-gradient(135deg, #fff, var(--gold), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% auto; animation: shineLogo 3s linear infinite; filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.3)); }
        @keyframes shineLogo { to { background-position: 200% center; } }

        .platform-icon { font-size: 3rem; transition: 0.4s; opacity: 0.4; cursor: pointer; }
        .platform-icon:hover { opacity: 1; transform: translateY(-10px) scale(1.2); filter: drop-shadow(0 0 20px currentColor); }

        .ultra-glass { background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255, 215, 0, 0.1); border-radius: 40px; box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255, 215, 0, 0.05); }
        
        .neon-input { background: rgba(0,0,0,0.8); border: 2px solid rgba(255, 215, 0, 0.2); border-radius: 20px; transition: 0.3s; color: var(--gold); }
        .neon-input:focus { border-color: var(--gold); box-shadow: 0 0 30px rgba(255, 215, 0, 0.4), inset 0 0 10px rgba(255, 215, 0, 0.2); outline: none; transform: scale(1.01); }

        .btn-empire { background: linear-gradient(45deg, #cc9900, var(--gold), #ffeb66); color: #000; border-radius: 20px; transition: 0.4s; font-weight: 900; text-transform: uppercase; box-shadow: 0 10px 20px rgba(255, 215, 0, 0.2); }
        .btn-empire:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255, 215, 0, 0.5); filter: brightness(1.1); }

        .radar-box { position: relative; width: 80px; height: 80px; border-radius: 50%; border: 2px solid rgba(255, 215, 0, 0.3); margin: 0 auto; overflow: hidden; }
        .radar-box::before { content: ''; position: absolute; top: 50%; left: 50%; width: 50%; height: 50%; background: linear-gradient(45deg, rgba(255, 215, 0, 0.8), transparent); transform-origin: 0% 0%; animation: scan 2s linear infinite; }
        @keyframes scan { to { transform: rotate(360deg); } }

        .quality-card { background: rgba(25, 25, 25, 0.8); border: 1px solid rgba(255, 215, 0, 0.1); border-radius: 15px; cursor: pointer; transition: 0.3s; opacity: 0; transform: translateY(20px); animation: popUp 0.5s forwards; }
        @keyframes popUp { to { opacity: 1; transform: translateY(0); } }
        .quality-card:hover { background: var(--gold); color: #000; transform: scale(1.02) translateX(-10px); box-shadow: 0 10px 25px rgba(255, 215, 0, 0.3); }
        .quality-card:hover i { color: #000; }

        #real-download-hud { backdrop-filter: blur(20px); background: rgba(5, 5, 5, 0.95); }
        .hud-data-box { background: rgba(255, 215, 0, 0.05); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 20px; }
        .glow-text { text-shadow: 0 0 15px var(--gold); }
        
        .btn-cancel { background: rgba(220, 38, 38, 0.1); border: 1px solid rgba(220, 38, 38, 0.5); color: #ef4444; transition: 0.3s; }
        .btn-cancel:hover { background: rgba(220, 38, 38, 0.8); color: #fff; box-shadow: 0 0 20px rgba(220, 38, 38, 0.5); transform: scale(1.02); }

        /* 👑 زر الواتساب العائم */
        .whatsapp-float { position: fixed; bottom: 30px; left: 30px; background: rgba(37, 211, 102, 0.1); color: #25d366; padding: 12px 25px; border-radius: 50px; border: 1px solid rgba(37, 211, 102, 0.3); font-weight: bold; z-index: 40; backdrop-filter: blur(10px); display: flex; align-items: center; gap: 10px; font-size: 1.1rem; transition: 0.4s; animation: float-wa 4s ease-in-out infinite; text-decoration: none; }
        .whatsapp-float:hover { background: #25d366; color: #fff; box-shadow: 0 15px 30px rgba(37, 211, 102, 0.4); transform: scale(1.05) translateY(-5px); border-color: #25d366; }
        @keyframes float-wa { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    </style>
</head>
<body class="flex flex-col items-center pt-20 pb-24 px-4">
    <div id="magic-bg"></div>
    <div class="cyber-grid"></div>
    <div id="bg-glow"></div>
    <canvas id="particle-canvas"></canvas>

    <a href="https://wa.me/201221309155" target="_blank" class="whatsapp-float">
        <i class="fab fa-whatsapp text-2xl"></i> تواصل مع المطور
    </a>

    <div id="real-download-hud" class="fixed inset-0 z-50 hidden flex-col items-center justify-center p-4">
        <div class="w-full max-w-md hud-data-box p-8 space-y-6 text-center animate__animated animate__zoomIn">
            <h2 class="text-3xl font-black text-yellow-500 tracking-widest glow-text">جاري سحب البيانات</h2>
            
            <div class="grid grid-cols-2 gap-4 text-sm font-bold text-gray-300 font-mono">
                <div class="bg-black/50 p-3 rounded-xl border border-yellow-500/20">
                    <span class="block text-yellow-500 mb-1">السرعة</span>
                    <span id="dl-speed">0 MB/s</span>
                </div>
                <div class="bg-black/50 p-3 rounded-xl border border-yellow-500/20">
                    <span class="block text-yellow-500 mb-1">تم تحميل</span>
                    <span id="dl-loaded" dir="ltr">0 / 0 MB</span>
                </div>
            </div>

            <div class="w-full h-4 bg-gray-900 rounded-full overflow-hidden border border-yellow-500/30 relative">
                <div id="dl-bar" class="h-full bg-gradient-to-r from-yellow-700 to-yellow-400 w-0 transition-all duration-200"></div>
            </div>
            
            <p id="dl-percent" class="text-2xl font-black text-yellow-500 glow-text">0%</p>
            <p id="dl-status" class="text-xs text-yellow-400 font-bold animate-pulse">جاري فك التشفير وتهيئة الملف...</p>

            <button onclick="cancelDownload()" class="btn-cancel w-full py-3 rounded-xl font-bold tracking-wider mt-4">
                إلغاء التحميل <i class="fas fa-times-circle ml-2"></i>
            </button>
        </div>
    </div>

    <div class="w-full max-w-3xl z-10 text-center space-y-12 animate__animated animate__fadeIn">
        <div>
            <h1 class="brand-logo italic">U2 | DOWNLOADER</h1>
            <p class="text-yellow-500/60 tracking-[15px] text-[10px] font-bold uppercase mt-2">Ultra Speed Engine</p>
        </div>

        <div class="flex justify-center gap-10 flex-wrap">
            <i onclick="vibrate(); changeColor('#ff0000')" class="fab fa-youtube platform-icon text-red-600"></i>
            <i onclick="vibrate(); changeColor('#00f2fe')" class="fab fa-tiktok platform-icon text-cyan-400"></i>
            <i onclick="vibrate(); changeColor('#1877f2')" class="fab fa-facebook platform-icon text-blue-500"></i>
            <i onclick="vibrate(); changeColor('#e1306c')" class="fab fa-instagram platform-icon text-pink-500"></i>
        </div>

        <div class="ultra-glass p-8 md:p-14 space-y-8">
            <div class="space-y-5">
                <input type="text" id="url-input" placeholder="ألصق الرابط هنا للاختراق..." class="neon-input w-full p-6 text-xl text-center font-bold">
                <button onclick="analyze()" id="action-btn" class="btn-empire w-full py-6 text-2xl tracking-widest">فحص الرابط</button>
            </div>

            <div id="loader" class="hidden py-10 space-y-4">
                <div class="radar-box"></div>
                <p class="text-yellow-500 font-bold animate-pulse tracking-widest text-sm">جاري اختراق السيرفرات...</p>
            </div>

            <div id="results" class="hidden space-y-10">
                <div class="relative group mx-auto w-full max-w-md">
                    <img id="thumb" class="rounded-3xl border-2 border-yellow-500/20 w-full shadow-2xl transition-all duration-500 group-hover:border-yellow-500/60">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent rounded-3xl"></div>
                    <h3 id="video-title" class="absolute bottom-6 right-6 left-6 font-bold text-lg text-white text-right drop-shadow-md line-clamp-2"></h3>
                </div>
                <div id="formats-box" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        function vibrate() { if (navigator.vibrate) navigator.vibrate(40); }
        function changeColor(c) { document.getElementById('bg-glow').style.background = `radial-gradient(circle at 50% 30%, ${c}25 0%, transparent 70%)`; }

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null };

        window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; init(); });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5; this.dx = (Math.random() - 0.5) * 0.5; this.dy = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.dx; this.y += this.dy;
                if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
                if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;
                if(mouse.x && mouse.y) {
                    let dx = mouse.x - this.x; let dy = mouse.y - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < 100) { this.x -= dx/20; this.y -= dy/20; }
                }
                this.draw();
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 215, 0, 0.5)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        function init() { canvas.width = innerWidth; canvas.height = innerHeight; particles = []; for (let i = 0; i < 100; i++) particles.push(new Particle()); }
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => p.update()); requestAnimationFrame(animate); }
        init(); animate();

        let downloadController = null;

        function cancelDownload() {
            if(downloadController) {
                downloadController.abort();
                vibrate();
                const statusEl = document.getElementById('dl-status');
                statusEl.innerText = 'تم إلغاء التحميل بنجاح!';
                statusEl.classList.replace('text-yellow-400', 'text-red-500');
                
                setTimeout(() => {
                    document.getElementById('real-download-hud').classList.add('hidden');
                    document.getElementById('real-download-hud').style.display = 'none';
                    statusEl.classList.replace('text-red-500', 'text-yellow-400');
                }, 1500);
            }
        }

        async function startRealDownload(url, expectedSizeStr) {
            vibrate();
            downloadController = new AbortController();
            const signal = downloadController.signal;

            const hud = document.getElementById('real-download-hud');
            const speedEl = document.getElementById('dl-speed');
            const loadedEl = document.getElementById('dl-loaded');
            const barEl = document.getElementById('dl-bar');
            const percentEl = document.getElementById('dl-percent');
            const statusEl = document.getElementById('dl-status');
            
            let expectedMB = parseFloat(expectedSizeStr);
            if(isNaN(expectedMB)) expectedMB = 0;

            hud.classList.remove('hidden');
            hud.style.display = 'flex';
            barEl.style.width = '0%';
            percentEl.innerText = '0%';
            statusEl.innerText = 'جاري فك التشفير وتهيئة الملف...';
            speedEl.innerText = '0 MB/s';
            loadedEl.innerText = expectedMB > 0 ? `0 / ${expectedMB} MB` : '0 MB';

            try {
                const response = await fetch(url, { signal });
                if (!response.ok) throw new Error("Network response was not ok");

                const reader = response.body.getReader();
                let receivedLength = 0; 
                let chunks = [];
                let startTime = Date.now();
                let lastTime = startTime;
                let lastLoaded = 0;
                let isFirstChunk = true;

                statusEl.innerText = 'جاري التحميل بأقصى سرعة...';

                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    
                    chunks.push(value);
                    receivedLength += value.length;

                    let currentTime = Date.now();
                    if (isFirstChunk || currentTime - lastTime > 250) {
                        isFirstChunk = false;
                        let downloadedMB = (receivedLength / 1024 / 1024).toFixed(1);
                        
                        let timeDiff = (currentTime - lastTime) / 1000;
                        let bytesDiff = receivedLength - lastLoaded;
                        let speedMBps = timeDiff > 0 ? ((bytesDiff / 1024 / 1024) / timeDiff).toFixed(2) : 0;
                        
                        speedEl.innerText = `${speedMBps} MB/s`;
                        
                        if(expectedMB > 0) {
                            loadedEl.innerText = `${downloadedMB} / ${expectedMB} MB`;
                            let percent = Math.min(100, Math.round((downloadedMB / expectedMB) * 100));
                            barEl.style.width = `${percent}%`;
                            percentEl.innerText = `${percent}%`;
                        } else {
                            loadedEl.innerText = `${downloadedMB} MB`;
                            barEl.style.width = '100%';
                            percentEl.innerText = '...';
                        }

                        lastTime = currentTime;
                        lastLoaded = receivedLength;
                    }
                }

                barEl.style.width = '100%';
                percentEl.innerText = '100%';
                statusEl.innerText = 'تم! جاري حفظ الملف في الجهاز...';
                vibrate();

                const blob = new Blob(chunks);
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                
                // 👑 تحديد الاسم الافتراضي إذا لم يُرسل من السيرفر
                let filename = "U2_DOWNLOADER_Media.mp4";
                const contentDisp = response.headers.get('Content-Disposition');
                if (contentDisp && contentDisp.includes('filename=')) {
                    filename = contentDisp.split('filename=')[1].replace(/"/g, '');
                }
                a.download = filename;
                
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(downloadUrl);

                setTimeout(() => {
                    hud.classList.add('hidden');
                    hud.style.display = 'none';
                }, 2000);

            } catch (error) {
                if (error.name === 'AbortError') {
                    // تم الإلغاء
                } else {
                    statusEl.innerText = 'حدث خطأ في التحميل! جرب الجودة الأقل.';
                    statusEl.classList.replace('text-yellow-400', 'text-red-500');
                    setTimeout(() => { 
                        hud.classList.add('hidden'); 
                        hud.style.display = 'none'; 
                        statusEl.classList.replace('text-red-500', 'text-yellow-400');
                    }, 4000);
                }
            }
        }

        async function analyze() {
            vibrate();
            const url = document.getElementById('url-input').value;
            if(!url) return;
            
            const btn = document.getElementById('action-btn');
            btn.innerText = "جاري الاتصال..."; btn.style.opacity = "0.5";
            
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');
            
            try {
                const res = await fetch('/analyze', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url}) });
                const data = await res.json();
                
                document.getElementById('loader').classList.add('hidden');
                btn.innerText = "فحص الرابط"; btn.style.opacity = "1";

                if(data.success) {
                    vibrate();
                    document.getElementById('results').classList.remove('hidden');
                    document.getElementById('thumb').src = data.thumbnail;
                    document.getElementById('video-title').innerText = data.title;
                    
                    const box = document.getElementById('formats-box');
                    box.innerHTML = '';
                    data.formats.forEach((f, i) => {
                        const downloadUrl = `/download?url=${encodeURIComponent(url)}&format_id=${f.id}&is_audio=${f.type==='audio'}&res=${f.res_val || 0}`;
                        box.innerHTML += `
                            <div onclick="startRealDownload('${downloadUrl}', '${f.size}')" class="quality-card p-5 flex justify-between items-center" style="animation-delay: ${i*0.1}s">
                                <span class="font-bold text-lg tracking-wide">${f.label}</span>
                                <div class="flex items-center gap-3">
                                    <span class="text-[11px] opacity-50 font-mono bg-black/30 px-2 py-1 rounded-md">${f.size}</span>
                                    <i class="fas ${f.type==='audio'?'fa-music text-green-400':'fa-bolt text-yellow-400'} text-2xl"></i>
                                </div>
                            </div>`;
                    });
                } else { alert("الرابط غير صحيح أو محمي."); }
            } catch (e) { 
                alert("خطأ في الاتصال بالسيرفر.");
                btn.innerText = "فحص الرابط"; btn.style.opacity = "1";
                document.getElementById('loader').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
