<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Downloader | Pro Video & Audio SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-bounce-slow { animation: bounce-slow 3s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center justify-center">

    <div class="max-w-2xl w-full text-center">
        <div class="flex flex-col items-center mb-8 animate-bounce-slow">
            <div class="relative">
                <div class="absolute inset-0 bg-blue-500 rounded-full blur-2xl opacity-20 animate-pulse"></div>
                <div class="relative bg-gradient-to-br from-blue-600 to-emerald-500 w-24 h-24 rounded-3xl flex items-center justify-center shadow-2xl mb-4 transform rotate-12 hover:rotate-0 transition-all duration-500 group">
                    <i class="fas fa-cloud-download-alt text-5xl text-white group-hover:scale-110 transition-transform"></i>
                </div>
            </div>
            <h1 class="text-6xl font-black bg-gradient-to-r from-blue-400 via-white to-emerald-400 bg-clip-text text-transparent tracking-tighter">
                X-DOWNLOADER
            </h1>
            <div class="h-1.5 w-24 bg-gradient-to-r from-blue-500 to-emerald-500 rounded-full mt-3"></div>
        </div>

        <p class="text-gray-400 mb-10 text-xl font-medium">Download HD Videos & Convert to MP3 Instantly</p>

        <div class="glass-card p-8 rounded-[2rem] shadow-2xl mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <input id="videoUrl" type="text" placeholder="Paste link (YouTube, TikTok, FB...)" 
                       class="flex-1 bg-slate-900/50 border border-slate-700 rounded-2xl px-6 py-5 focus:outline-none focus:border-blue-500 text-white transition-all text-lg shadow-inner">
                <button onclick="getInfo()" id="mainBtn" class="bg-blue-600 hover:bg-blue-700 px-10 py-5 rounded-2xl font-black transition-all flex items-center justify-center gap-3 shadow-lg shadow-blue-900/20">
                    <span>FETCH</span>
                    <i class="fas fa-magic"></i>
                </button>
            </div>
        </div>

        <div id="loading" class="hidden my-12">
            <div class="loader w-12 h-12 border-4 border-slate-800 rounded-full mx-auto"></div>
            <p class="text-blue-400 mt-4 font-bold tracking-widest uppercase text-sm">Processing Media...</p>
        </div>

        <div id="result" class="hidden animate-in fade-in zoom-in duration-500">
            <div class="glass-card p-6 rounded-[2.5rem] overflow-hidden">
                <img id="thumb" src="" class="w-full rounded-[1.5rem] mb-6 shadow-2xl max-h-72 object-cover">
                <h2 id="title" class="text-2xl font-bold mb-8 text-left leading-snug px-2"></h2>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="links">
                    </div>
            </div>
        </div>
    </div>

    <script>
        async function getInfo() {
            const url = document.getElementById('videoUrl').value;
            const btn = document.getElementById('mainBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            if(!url) return;
            
            loading.classList.remove('hidden');
            result.classList.add('hidden');
            btn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('url', url);

                const response = await fetch('/get_info', { method: 'POST', body: formData });
                const data = await response.json();

                if(response.ok) {
                    document.getElementById('title').innerText = data.title;
                    document.getElementById('thumb').src = data.thumbnail;
                    
                    const linksDiv = document.getElementById('links');
                    linksDiv.innerHTML = '';
                    
                    data.formats.forEach(f => {
                        const isAudio = f.id === 'bestaudio';
                        const bgColor = isAudio ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-blue-600 hover:bg-blue-500';
                        const icon = isAudio ? 'fa-headphones' : 'fa-video';
                        
                        linksDiv.innerHTML += `
                            <button onclick="startDownload('${data.url}', '${f.id}')" class="${bgColor} p-5 rounded-2xl text-sm font-black transition-all flex items-center justify-between group shadow-xl">
                                <span class="flex items-center gap-3 uppercase tracking-tighter">
                                    <i class="fas ${icon}"></i> 
                                    ${f.resolution} ${f.ext}
                                </span>
                                <i class="fas fa-download opacity-40 group-hover:opacity-100 transition-opacity"></i>
                            </button>`;
                    });

                    result.classList.remove('hidden');
                } else {
                    alert('Error: ' + data.detail);
                }
            } catch (err) {
                alert('Connection Error');
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function startDownload(videoUrl, formatId) {
            window.location.href = `/download?url=${encodeURIComponent(videoUrl)}&format_id=${encodeURIComponent(formatId)}`;
        }
    </script>
</body>
</html>
