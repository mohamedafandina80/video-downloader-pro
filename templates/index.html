<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U2 | DOWNLOADER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { margin: 0; background: #000; font-family: 'Cairo', sans-serif; color: #fff; overflow-x: hidden; }
        
        /* تأثير الخلفية المتوهجة */
        #magic-bg { position: fixed; inset: 0; z-index: -3; background: radial-gradient(circle at center, #0a0a1a 0%, #000 100%); }
        #particle-canvas { position: fixed; inset: 0; z-index: -2; pointer-events: none; }

        .chrome-logo { font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 900; background: linear-gradient(to right, #fff, #b59410, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% auto; animation: shine 4s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }

        .ultra-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 40px; }
        .platform-icon { font-size: 3rem; opacity: 0.4; cursor: pointer; transition: 0.5s; }
        .platform-icon:hover { opacity: 1; transform: scale(1.3) rotate(10deg); filter: drop-shadow(0 0 15px currentColor); }

        .format-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); transition: 0.3s; border-radius: 20px; opacity: 0; transform: translateY(20px); animation: fadeIn 0.5s forwards; }
        .format-item:hover { background: #b59410; color: #000; transform: scale(1.02) translateX(-10px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col items-center pt-20 pb-20 px-4">
    <div id="magic-bg"></div>
    <canvas id="particle-canvas"></canvas>

    <a href="https://wa.me/201221309155" target="_blank" class="fixed bottom-8 left-8 z-50 bg-[#25d366] p-4 rounded-full shadow-2xl hover:scale-110 transition-all">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <div class="w-full max-w-4xl space-y-16 z-10 text-center">
        <div>
            <h1 class="chrome-logo italic mb-2">U2 | DOWNLOADER</h1>
            <p class="text-gray-500 tracking-[10px] uppercase text-xs font-bold">The Premium Streaming Engine</p>
        </div>

        <div class="flex justify-center gap-10 flex-wrap">
            <i onclick="setTheme('#ff0000')" class="fab fa-youtube platform-icon text-red-600"></i>
            <i onclick="setTheme('#ffffff')" class="fab fa-tiktok platform-icon text-white"></i>
            <i onclick="setTheme('#1877f2')" class="fab fa-facebook platform-icon text-blue-600"></i>
            <i onclick="setTheme('#e1306c')" class="fab fa-instagram platform-icon text-pink-600"></i>
        </div>

        <div class="ultra-card p-10 md:p-16 space-y-10">
            <div class="space-y-4">
                <input type="text" id="url-input" placeholder="ألصق رابط الفيديو هنا..." class="w-full bg-black/50 border border-white/10 p-6 rounded-3xl text-xl text-center font-bold outline-none focus:border-yellow-500 transition-all">
                <button onclick="analyze()" id="action-btn" class="w-full bg-gradient-to-r from-yellow-700 to-yellow-500 py-6 rounded-3xl text-2xl font-black italic text-black">تحليل المحتوى</button>
            </div>

            <div id="loader" class="hidden py-10">
                <div class="w-12 h-12 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-yellow-500 font-bold animate-pulse">جاري فحص الروابط...</p>
            </div>

            <div id="results" class="hidden grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="relative">
                    <img id="thumb" class="rounded-[30px] border-4 border-white/5 w-full shadow-2xl">
                    <h3 id="video-title" class="text-right font-bold mt-4 text-gray-300"></h3>
                </div>
                <div id="formats-box" class="space-y-3 text-right"></div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. أنيميشن شبكة النقاط والخطوط ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; init(); });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.dx = (Math.random() - 0.5) * 0.5;
                this.dy = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.dx; this.y += this.dy;
                if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
                if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;
                this.draw();
            }
            draw() {
                ctx.fillStyle = 'rgba(181, 148, 16, 0.5)'; ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        function init() {
            canvas.width = innerWidth; canvas.height = innerHeight;
            particles = [];
            for (let i = 0; i < 100; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => p.update());
            connect();
            requestAnimationFrame(animate);
        }

        function connect() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i; j < particles.length; j++) {
                    let dist = ((particles[i].x - particles[j].x)**2 + (particles[i].y - particles[j].y)**2);
                    if (dist < 15000) {
                        ctx.strokeStyle = `rgba(181, 148, 16, ${1 - dist/15000})`;
                        ctx.lineWidth = 0.5; ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                    }
                }
                if (mouse.x) {
                    let mDist = ((particles[i].x - mouse.x)**2 + (particles[i].y - mouse.y)**2);
                    if (mDist < 20000) {
                        ctx.strokeStyle = 'rgba(255, 234, 0, 0.4)'; ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();
                    }
                }
            }
        }

        init(); animate();

        // --- 2. منطق الموقع ---
        function setTheme(color) { document.getElementById('magic-bg').style.background = `radial-gradient(circle at center, ${color}15 0%, #000 100%)`; }

        async function analyze() {
            const url = document.getElementById('url-input').value;
            if(!url) return;
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');
            try {
                const res = await fetch('/analyze', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url}) });
                const data = await res.json();
                document.getElementById('loader').classList.add('hidden');
                if(data.success) {
                    document.getElementById('results').classList.remove('hidden');
                    document.getElementById('thumb').src = data.thumbnail;
                    document.getElementById('video-title').innerText = data.title;
                    const box = document.getElementById('formats-box');
                    box.innerHTML = '';
                    data.formats.forEach((f, i) => {
                        box.innerHTML += `
                            <div onclick="location.href='/download?url=${encodeURIComponent(url)}&format_id=${f.id}&is_audio=${f.type==='audio'}'" 
                                 class="format-item p-4 flex justify-between items-center cursor-pointer" style="animation-delay: ${i*0.1}s">
                                <span class="font-bold">${f.label}</span>
                                <div class="flex items-center gap-3">
                                    <span class="text-[10px] opacity-50 font-mono">${f.size}</span>
                                    <i class="fas ${f.type==='audio'?'fa-music':'fa-video'} text-yellow-500"></i>
                                </div>
                            </div>`;
                    });
                }
            } catch (e) { alert("Error connecting to server"); }
        }
    </script>
</body>
</html>
